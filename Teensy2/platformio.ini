[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
lib_deps = 
	paulstoffregen/Time
	adafruit/Adafruit MLX90614 Library
	adafruit/Adafruit ADXL345
	adafruit/Adafruit GFX Library
	adafruit/Adafruit SSD1306
	adafruit/Adafruit LSM6DS@^4.7.4